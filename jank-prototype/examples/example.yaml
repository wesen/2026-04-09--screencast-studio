schema: recorder.config/v1
session_id: demo

destination_templates:
  per_source: "./recordings/{session_id}/{source_name}.{ext}"
  audio_mix: "./recordings/{session_id}/audio-mix.{ext}"

screen_capture_defaults:
  capture:
    fps: 24
    cursor: true
    follow_resize: false
  output:
    container: mov
    video_codec: h264
    quality: 75

camera_capture_defaults:
  capture:
    fps: 30
    mirror: false
    size: "1280x720"
  output:
    container: mov
    video_codec: h264
    quality: 80

audio_defaults:
  output:
    codec: pcm_s16le
    sample_rate_hz: 48000
    channels: 2

audio_mix:
  destination_template: audio_mix

video_sources:
  - id: desktop
    name: Full Desktop
    type: display
    target:
      display: ":0.0"
    destination_template: per_source

  - id: browser_window
    name: Browser Window
    type: window
    target:
      display: ":0.0"
      window_id: "0x3a00007"
    destination_template: per_source

  - id: top_left_region
    name: Top Left Region
    type: region
    target:
      display: ":0.0"
      rect:
        x: 0
        y: 0
        w: 1280
        h: 720
    settings:
      capture:
        cursor: false
    destination_template: per_source

  - id: webcam
    name: Webcam
    type: camera
    target:
      device: "/dev/video0"
    settings:
      capture:
        mirror: true
    destination_template: per_source

audio_sources:
  - id: mic
    name: Built-in Mic
    device: default
    settings:
      gain: 1.0
