schema: "recorder.config/v1"
session_id: "adaptive-preview-measure-after-current"
destination_templates:
  audio_mix: "/home/manuel/code/wesen/2026-04-09--screencast-studio/ttmp/2026/04/13/SCS-0014--fix-preview-regressions-in-screencast-studio-web-ui/scripts/19-live-app-preview-recording-cpu-measure/results/20260414-142808/output/audio-mix.{ext}"
