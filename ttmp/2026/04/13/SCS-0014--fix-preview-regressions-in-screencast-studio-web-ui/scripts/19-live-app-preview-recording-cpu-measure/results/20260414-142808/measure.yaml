    name: "Measure Region"
    type: "region"
    enabled: true
    target:
      display: ":0"
      rect:
        x: 0
        y: 960
        w: 2880
        h: 960
    settings:
      capture:
        fps: 24
        cursor: true
        follow_resize: false
      output:
        container: "mov"
        video_codec: "h264"
        quality: 75
    destination_template: "per_source"
audio_sources:
  - id: "mic-1"
    name: "Built-in Mic"
    device: "default"
    enabled: true
    settings:
      gain: 1
      noise_gate: false
      denoise: false
